version: '3.8'\nservices:\n  postgres:\n    image: postgres:13\n    restart: always\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: database\n    ports:\n      - "5432:5432"\n\n  redis:\n    image: redis:6\n    restart: always\n    ports:\n      - "6379:6379"\n\n  fastapi:\n    build: .\n    restart: always\n    ports:\n      - "8000:8000"\n    depends_on:\n      - postgres\n      - redis\n    environment:\n      DATABASE_URL: postgres://user:password@postgres/database\n      REDIS_URL: redis://redis:6379/0\n