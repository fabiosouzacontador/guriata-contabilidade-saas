services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: guriata
      POSTGRES_PASSWORD: guriata_password
      POSTGRES_DB: guriata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://guriata:guriata_password@db:5432/guriata_db
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
