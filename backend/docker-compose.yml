services:
  db:
    image: postgres:15-alpine
    container_name: guriata_db
    environment:
      POSTGRES_USER: guriata
      POSTGRES_PASSWORD: guriata_password
      POSTGRES_DB: guriata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guriata_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://guriata:guriata_password@db:5432/guriata_db
      DEBUG: "True"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
